<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="glow-grad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <filter id="node-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="line-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background tile -->
  <rect width="200" height="200" rx="44" fill="url(#bg-grad)"/>

  <!-- Ambient inner glow -->
  <rect width="200" height="200" rx="44" fill="url(#glow-grad)"/>

  <!-- Subtle inner border -->
  <rect x="1" y="1" width="198" height="198" rx="43" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" fill="none"/>

  <!-- ── Neural-A skeleton lines (glowing) ── -->
  <!-- Left leg: top-node → bottom-left-node -->
  <line x1="100" y1="44" x2="46" y2="148" stroke="rgba(255,255,255,0.55)" stroke-width="5" stroke-linecap="round" filter="url(#line-glow)"/>
  <!-- Right leg: top-node → bottom-right-node -->
  <line x1="100" y1="44" x2="154" y2="148" stroke="rgba(255,255,255,0.55)" stroke-width="5" stroke-linecap="round" filter="url(#line-glow)"/>
  <!-- Crossbar: mid-left → mid-right -->
  <line x1="64" y1="112" x2="136" y2="112" stroke="rgba(255,255,255,0.45)" stroke-width="4" stroke-linecap="round" filter="url(#line-glow)"/>
  <!-- Subtle: crossbar nodes to bottom corners (extra neural edges) -->
  <line x1="64" y1="112" x2="46" y2="148" stroke="rgba(255,255,255,0.18)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="136" y1="112" x2="154" y2="148" stroke="rgba(255,255,255,0.18)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── Nodes ── -->
  <!-- Top node (apex) -->
  <circle cx="100" cy="44" r="10" fill="white" filter="url(#node-glow)"/>
  <circle cx="100" cy="44" r="5.5" fill="white"/>

  <!-- Bottom-left node -->
  <circle cx="46" cy="148" r="9" fill="white" filter="url(#node-glow)"/>
  <circle cx="46" cy="148" r="5" fill="white"/>

  <!-- Bottom-right node -->
  <circle cx="154" cy="148" r="9" fill="white" filter="url(#node-glow)"/>
  <circle cx="154" cy="148" r="5" fill="white"/>

  <!-- Crossbar-left node -->
  <circle cx="64" cy="112" r="6.5" fill="rgba(255,255,255,0.92)" filter="url(#node-glow)"/>
  <circle cx="64" cy="112" r="3.5" fill="white"/>

  <!-- Crossbar-right node -->
  <circle cx="136" cy="112" r="6.5" fill="rgba(255,255,255,0.92)" filter="url(#node-glow)"/>
  <circle cx="136" cy="112" r="3.5" fill="white"/>
</svg>
